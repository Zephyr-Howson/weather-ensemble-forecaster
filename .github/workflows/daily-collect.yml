name: Daily forecast collection

on:
  schedule:
    # 08:00 UTC ~= 18:00 Melbourne (AEST) / 19:00 (AEDT) - an evening collection run.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: daily-weather-collection
  # true (not false): each day's run is independent and self-contained, so if
  # a manual workflow_dispatch run and the scheduled run ever overlap, the
  # older one should yield to the newer rather than blocking it - there's
  # nothing in a half-finished run worth preserving. Note: this is not what
  # caused the report to stop updating on 2026-07-22/23 - re-checking the
  # Actions history afterwards showed the scheduled runs WERE firing every
  # day and were never blocked; each one simply ran past this job's
  # timeout-minutes and got killed mid-job. See that field's comment.
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    # A real incident: this was 45 for months, but by 2026-07 the full 30-
    # location pipeline had grown to take ~39 minutes on a good day - close
    # enough to the ceiling that the next two days' runs got killed mid-job
    # by this timeout (not blocked by a stuck previous run - that's a
    # different problem, see the concurrency comment below). One was cut off
    # mid-collect, the other mid-report-generation, and either way nothing
    # got committed, so the report silently stopped updating. 120 gives
    # genuine headroom instead of sitting right at the edge.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -U pip
      - run: pip install -e .

      - name: Collect, record actual, blend baseline, retrain, and predict for every location
        env:
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
          VISUAL_CROSSING_KEY: ${{ secrets.VISUAL_CROSSING_KEY }}
          OPENWEATHERMAP_KEY: ${{ secrets.OPENWEATHERMAP_KEY }}
          WEATHERBIT_KEY: ${{ secrets.WEATHERBIT_KEY }}
          ACCUWEATHER_KEY: ${{ secrets.ACCUWEATHER_KEY }}
        run: |
          weather-ensemble \
            --all-locations \
            --all --window 30 --train --train-window 90 --predict-ml

      - name: Regenerate accuracy report across all locations
        run: |
          weather-ensemble \
            --all-locations \
            --accuracy-report reports/accuracy_report.html

      - name: Commit updated database and accuracy report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.db reports/accuracy_report.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily forecast collection $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      # GitHub Pages deployment lives in its own workflow (deploy-pages.yml) so
      # it redeploys on *any* push that changes the report - including a manual
      # fix pushed outside this nightly run - not just once a day here.
