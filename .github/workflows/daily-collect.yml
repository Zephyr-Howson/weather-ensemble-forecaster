name: Daily forecast collection

on:
  schedule:
    # 08:00 UTC ~= 18:00 Melbourne (AEST) / 19:00 (AEDT) - an evening collection run.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: daily-weather-collection
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -U pip
      - run: pip install -e .

      - name: Collect, record actual, blend baseline, retrain, and predict for every location
        env:
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
          VISUAL_CROSSING_KEY: ${{ secrets.VISUAL_CROSSING_KEY }}
          OPENWEATHERMAP_KEY: ${{ secrets.OPENWEATHERMAP_KEY }}
          WEATHERBIT_KEY: ${{ secrets.WEATHERBIT_KEY }}
          ACCUWEATHER_KEY: ${{ secrets.ACCUWEATHER_KEY }}
        run: |
          weather-ensemble \
            --all-locations \
            --all --window 30 --train --train-window 90 --predict-ml

      - name: Regenerate accuracy report across all locations
        run: |
          weather-ensemble \
            --all-locations \
            --accuracy-report reports/accuracy_report.html

      - name: Commit updated database and accuracy report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.db reports/accuracy_report.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily forecast collection $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      # Publishes the same report to a stable GitHub Pages URL so it can just
      # be refreshed for the latest data, instead of needing a git pull + local
      # file open. One-time manual setup required first: repo Settings > Pages
      # > Build and deployment > Source = "GitHub Actions". Ordered after the
      # data commit above and never fails the job, so a not-yet-enabled Pages
      # site (or any Pages hiccup) can't block the actual data pipeline.
      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp reports/accuracy_report.html site/index.html
        continue-on-error: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
        continue-on-error: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
