name: Daily forecast collection

on:
  schedule:
    # 08:00 UTC ~= 18:00 Melbourne (AEST) / 19:00 (AEDT) - an evening collection run.
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: daily-weather-collection
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -U pip
      - run: pip install -e .

      - name: Collect tomorrow's forecast, record yesterday's actual, blend baseline
        env:
          WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
          VISUAL_CROSSING_KEY: ${{ secrets.VISUAL_CROSSING_KEY }}
        run: |
          weather-ensemble \
            --lat -37.8136 --lon 144.9631 \
            --name Melbourne --timezone Australia/Melbourne \
            --all --window 14

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weather.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Daily forecast collection $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
